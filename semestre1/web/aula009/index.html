<!DOCTYPE html>
<!-- Define que o documento usa HTML5 -->

<html lang="pt-br">
<!-- Define idioma como português do Brasil -->

<head>
    <meta charset="UTF-8">
    <!-- Define codificação de caracteres (acentos, etc) -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Responsividade: adapta layout para mobile -->

    <title>sem criatividade</title>
    <!-- Título da aba do navegador -->

    <link rel="stylesheet" href="style.css">
    <!-- Importa o arquivo CSS externo -->
</head>

<body>
    <!-- Início do conteúdo visível -->

    <div class="topo">
        <!-- Container do cabeçalho -->

        <div class="logo">LOGOTIPO</div>
        <!-- Logo do site (texto por enquanto) -->

        <div class="menu">
            <!-- Container do menu de navegação -->

            <ul>
                <!-- Lista não ordenada do menu -->

                <li><a href="#">Início</a></li>
                <!-- Item de menu -->

                <li><a href="#">Empresa</a></li>
                <!-- Item de menu -->

                <li><a href="#">Serviços</a></li>
                <!-- Item de menu -->

                <li><a href="#">Contato</a></li>
                <!-- Item de menu -->
            </ul>
        </div>
    </div>

    <div class="Servicos">
        <!-- Seção de serviços / cards -->

        <div class="coluna">
            <!-- Coluna individual -->

            <div class="card">
                <!-- Card visual -->

                <img src="img/aliengenerico.png" alt="ALIEN GENERICO">
                <!-- Imagem do card -->

                <h2>Alien Generico</h2>
                <!-- Título do card -->
            </div>
        </div>

        <div class="coluna">
            <div class="card">
                <img src="img/alienmaconha.png" alt="ALIEN MACONHA">
                <h2>Alien Maconha</h2>
            </div>
        </div>

        <div class="coluna">
            <div class="card">
                <img src="img/DiscoVinil.png" alt="DISCO VINIL">
                <h2>Disco Vinel</h2>
                <!-- OBS: tem erro de digitação (Vinel → Vinil) -->
            </div>
        </div>
    </div>

    <div class="destaque">
        <!-- Área de destaque (call to action) -->

        <a class="bt" href="#"> Inscreva-se </a>
        <!-- Botão estilizado -->
    </div>
</body>
</html>
