<!-- Define que o documento usa HTML5 -->
<!DOCTYPE html>
<!-- Início do documento HTML e define o idioma da página como português do Brasil -->
<html lang="pt-br">
<!-- Área de configurações da página (não aparece para o usuário) -->
<head>
    <!-- Define a codificação de caracteres como UTF-8 (permite usar acentos e caracteres especiais) -->
    <meta charset="UTF-8">
    <!-- Faz o site se adaptar corretamente a celulares e diferentes tamanhos de tela -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Conecta o arquivo de CSS externo chamado style.css para estilizar a página -->
    <link rel="stylesheet" href="style.css">
    <!-- Define o título da página que aparece na aba do navegador -->
    <title>aula</title>
</head>
<!-- Início da área visível da página -->
<body>
    <!-- Cabeçalho do site (normalmente contém logo, menu ou título principal) -->
    <header>cabeçalho</header>
    <!-- Área principal do conteúdo da página -->
    <main>
        <!-- Título nível 1 (o mais importante da página) -->
        <h1>Olá Mundo!!</h1>
        <!-- Título nível 2 -->
        <h2>Olá Mundo!!</h2>
        <!-- Título nível 3 -->
        <h3>Olá Mundo!!</h3>
        <!-- Título nível 4 -->
        <h4>Olá Mundo!!</h4>
        <!-- Título nível 5 -->
        <h5>Olá Mundo!!</h5>
        <!-- Título nível 6 (o menor nível de título) -->
        <h6>Olá Mundo!!</h6>
        <!-- Parágrafo de texto -->
        <p>Olá Mundo!!</p>
    </main>
    <!-- Rodapé da página (geralmente contém contatos, direitos autorais, links, etc.) -->
    <footer>fim da pagina</footer>
</body>
<!-- Fim do documento HTML -->
</html>
