<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            border-collapse: collapse;
            width: 100%;
        }

        thead tr th{
            border-top: 3px #000 solid;
            border-bottom: 3px #000 solid;
            height: 40px;
        }

        tbody tr{
            border-bottom: dashed 1px #000;
            padding: 5px;
        }

        tfoot tr td{
            background-color: #000;
            color: white;
            text-align: center;
            padding: 5px;
        }

        .ads{
            border-left: 1px dashed #000;
        }
    </style>

</head>
<body>
    <h1>entendendo de tabelas do html</h1>
    <table>
        <thead>
            <tr>
                <th>aluno</th>
                <th>matricula</th>
                <th>email</th>
                <th>curso</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>gabriel</td>
                <td>6767</td>
                <td>gabriel@email.com</td>
                <td>ads</td>
            </tr>
            <tr>
                <td>miguel</td>
                <td>90190</td>
                <td>miguel@email.com</td>
                <td>ads</td>
            </tr>
            <tr>
                <td>mary</td>
                <td>8080</td>
                <td>mary@email.com</td>
                <td rowspan="2" class="ads">ads</td>
            </tr>
            <tr>
                <td>otavio</td>
                <td colspan="2">6565</td>
                <td>otavio@email.com</td>
                <!--<td>ads</td>-->
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="5">tabela de alunos ativos 2026</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
